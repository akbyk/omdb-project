<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineSearch — Movie Lookup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- BACKGROUND GRAIN OVERLAY -->
  <div class="grain"></div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">CineSearch</span>
    </div>
    <p class="tagline">Every film. One search.</p>
  </header>

  <!-- SEARCH SECTION -->
  <main>
    <section class="search-section">
      <div class="search-bar-wrapper">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Enter a movie title..."
          autocomplete="off"
          spellcheck="false"
        />
        <div class="filters">
          <select id="typeFilter" class="filter-select">
            <option value="">All Types</option>
            <option value="movie">Movie</option>
            <option value="series">Series</option>
            <option value="episode">Episode</option>
          </select>
          <input
            type="number"
            id="yearFilter"
            class="filter-input"
            placeholder="Year"
            min="1888"
            max="2099"
          />
        </div>
        <button id="searchBtn" class="search-btn">
          <span class="btn-text">Search</span>
          <span class="btn-icon">→</span>
        </button>
      </div>

      <!-- HISTORY DROPDOWN -->
      <div id="historyDropdown" class="history-dropdown hidden">
        <p class="history-label">Recent searches</p>
        <ul id="historyList" class="history-list"></ul>
      </div>
    </section>

    <!-- ERROR MESSAGE -->
    <div id="errorBox" class="error-box hidden">
      <span class="error-icon">⚠</span>
      <span id="errorText">Something went wrong.</span>
    </div>

    <!-- LOADING SPINNER -->
    <div id="loadingSpinner" class="loading hidden">
      <div class="spinner-ring"></div>
      <p class="loading-text">Searching...</p>
    </div>

    <!-- RESULTS SECTION -->
    <section id="resultsSection" class="results-section hidden">
      <div class="results-header">
        <h2 id="resultsTitle" class="results-title"></h2>
        <span id="resultsCount" class="results-count"></span>
      </div>
      <div id="resultsGrid" class="results-grid"></div>
    </section>

    <!-- DETAIL MODAL -->
    <div id="detailModal" class="modal-overlay hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <button id="closeModal" class="modal-close" aria-label="Close">✕</button>
        <div class="modal-inner" id="modalInner"></div>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">🎬</div>
      <p class="empty-text">Search for any movie, series, or episode above.</p>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Powered by <a href="https://www.omdbapi.com" target="_blank" rel="noopener">OMDB API</a></p>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
